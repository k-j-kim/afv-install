# repos.conf — Central config for all repo references.
# Format: "owner/repo@branch"
# Both install-afv-skills.sh and generate-vsix.sh source this file.

# This repo (used to download vsix/ when running via curl | bash)
INSTALL_REPO="k-j-kim/afv-install@main"

# AFV skills library
AFV_LIBRARY_REPO="forcedotcom/afv-library@main"
AFV_SKILLS_SUBDIR="skills"

# SF CLI plugins to clone, build, and link
SF_PLUGIN_REPOS=(
  "salesforcecli/plugin-templates@main"
  "salesforcecli/plugin-deploy-retrieve@main"
)

# VS Code extension repos to build into .vsix files
VSIX_REPOS=(
  "forcedotcom/salesforcedx-vscode@main"
  "forcedotcom/einstein-gpt-for-vscode@main"
)
